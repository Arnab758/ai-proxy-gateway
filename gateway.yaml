# AI Gateway Configuration
gateway:
  port: 8080
  log_level: info

cache:
  redis_url: "redis://localhost:6379"  # Override with REDIS_URL env var
  vector:
    enabled: true
    dimension: 64         # Embedding vector dimension (reduced from 128 for speed)
    similarity_threshold: 0.95  # Cosine similarity threshold (higher = stricter matching)
    max_vectors_per_tenant: 10000
    exact_hash_first: true  # Try exact hash match before vector search
  jaccard:
    enabled: true         # Fallback to Jaccard similarity
    threshold: 0.75
  ttl_hours: 24
  template_matching:
    enabled: true
    max_templates: 1000

rate_limiter:
  enabled: true
  max_requests: 60
  window_minutes: 1

upstream:
  primary:
    provider: "groq"
    base_url: "https://api.groq.com/openai/v1"
    timeout_seconds: 10
    max_retries: 1
  fallback:
    provider: "openai"
    base_url: "https://api.openai.com/v1"
    timeout_seconds: 10
  circuit_breaker:
    enabled: false
    failure_threshold: 5
    recovery_timeout_seconds: 30

deduplication:
  enabled: true
  lock_ttl_seconds: 10
  max_wait_seconds: 30

loop_killer:
  enabled: true
  window_seconds: 30        # Sliding window for tracking
  max_entries: 100          # Max entries per tenant
  block_seconds: 60         # How long to block detected loops
  cooldown_seconds: 120    # Auto-cleanup after inactivity
  frequency_weight: 1.0    # Weight for request frequency
  similarity_weight: 2.0   # Weight for prompt similarity
  stage2_delay_ms: 500     # Delay added during throttle stage
  stage3_lockout_ms: 30000 # Max delay cap for stage 3

telemetry:
  enabled: true
  metrics_port: 9090

observer:
  enabled: true
  trial_duration_hours: 96
  contact_sales_url: ""
